<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ريلز القرآن الكريم</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&display=swap');

:root {
  --bg: #080810;
  --card: #10101a;
  --border: #22223a;
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --gold-glow: rgba(201,168,76,0.12);
  --text: #e8e8f2;
  --muted: #5a5a78;
  --green: #4caf82;
  --red: #e05555;
}

* { box-sizing:border-box; margin:0; padding:0; }

body {
  background:var(--bg);
  color:var(--text);
  font-family:'Tajawal',sans-serif;
  min-height:100vh;
  padding-bottom:60px;
}

/* noise texture overlay */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0; opacity:.6;
}

.wrap { max-width:760px; margin:0 auto; padding:0 16px; position:relative; z-index:1; }

/* HEADER */
header {
  text-align:center;
  padding:48px 0 36px;
  border-bottom:1px solid var(--border);
  margin-bottom:32px;
  position:relative;
}
header::after {
  content:'';
  position:absolute;
  bottom:-1px; left:50%; transform:translateX(-50%);
  width:140px; height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.logo {
  font-size:2rem;
  font-weight:900;
  color:var(--gold2);
  letter-spacing:.04em;
  text-shadow:0 0 40px rgba(201,168,76,.4);
}
.logo-sub {
  font-size:.85rem;
  color:var(--muted);
  margin-top:6px;
  font-weight:300;
}

/* CARD */
.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:22px;
  margin-bottom:18px;
}
.card-title {
  font-size:.7rem;
  font-weight:700;
  color:var(--gold);
  text-transform:uppercase;
  letter-spacing:.1em;
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:8px;
}
.card-title::before {
  content:'';
  width:3px; height:14px;
  background:var(--gold);
  border-radius:2px;
  display:inline-block;
}

/* FORM */
.field { margin-bottom:14px; }
.field label {
  display:block;
  font-size:.72rem;
  color:var(--muted);
  margin-bottom:6px;
}
select, input[type=number] {
  width:100%;
  background:#0c0c18;
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  padding:11px 14px;
  font-family:'Tajawal',sans-serif;
  font-size:.9rem;
  outline:none;
  transition:border .2s, box-shadow .2s;
  appearance:none;
  -webkit-appearance:none;
  cursor:pointer;
}
select:focus, input:focus {
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(201,168,76,.1);
}
option { background:#10101a; }

.row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

/* READERS */
.readers-scroll {
  display:flex; gap:8px; overflow-x:auto; padding-bottom:8px;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
.readers-scroll::-webkit-scrollbar { height:3px; }
.readers-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.reader-chip {
  flex-shrink:0;
  padding:8px 14px;
  background:#0c0c18;
  border:1px solid var(--border);
  border-radius:50px;
  color:var(--muted);
  font-size:.75rem;
  cursor:pointer;
  transition:all .2s;
  white-space:nowrap;
  font-family:'Tajawal',sans-serif;
}
.reader-chip:hover { border-color:var(--gold); color:var(--text); }
.reader-chip.active {
  border-color:var(--gold);
  background:var(--gold-glow);
  color:var(--gold2);
  font-weight:700;
}

/* VERSE DISPLAY */
#verse-box {
  background:#0c0c18;
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px;
  margin-top:14px;
  min-height:60px;
  text-align:center;
  font-family:'Amiri',serif;
  font-size:1.4rem;
  line-height:2.2;
  color:var(--text);
  direction:rtl;
  display:none;
  position:relative;
}
#verse-box.loading {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.dot { width:6px; height:6px; border-radius:50%; background:var(--gold); animation:pulse .9s ease-in-out infinite; }
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}

/* AUDIO PLAYER */
#player-card { display:none; }
.player {
  display:flex;
  align-items:center;
  gap:14px;
}
.play-btn {
  width:52px; height:52px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  box-shadow:0 4px 20px rgba(201,168,76,.3);
  transition:transform .15s, box-shadow .15s;
}
.play-btn:hover { transform:scale(1.06); box-shadow:0 6px 28px rgba(201,168,76,.4); }
.play-btn svg { width:22px; height:22px; fill:#000; }
.audio-info { flex:1; min-width:0; }
.reader-name-disp {
  font-size:.85rem;
  font-weight:700;
  color:var(--text);
  margin-bottom:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.audio-status { font-size:.72rem; color:var(--muted); margin-bottom:8px; }
.prog-wrap {
  height:4px;
  background:#1a1a2e;
  border-radius:2px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}
.prog-fill {
  height:100%;
  background:linear-gradient(90deg,var(--gold),var(--gold2));
  border-radius:2px;
  width:0%;
  transition:width .3s;
}
.vol-row {
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:12px;
}
.vol-row label { font-size:.72rem; color:var(--muted); }
.vol-row input[type=range] {
  flex:1; accent-color:var(--gold);
  background:transparent; border:none; padding:0; cursor:pointer;
}

/* GENERATE BTN */
.gen-btn {
  width:100%;
  padding:15px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none;
  border-radius:12px;
  color:#000;
  font-family:'Tajawal',sans-serif;
  font-size:1rem;
  font-weight:900;
  cursor:pointer;
  transition:all .2s;
  letter-spacing:.02em;
  box-shadow:0 4px 24px rgba(201,168,76,.25);
}
.gen-btn:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(201,168,76,.35); }
.gen-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }

/* RESULTS */
#results { display:none; }
.result-section { margin-bottom:22px; }
.result-label {
  font-size:.68rem;
  font-weight:700;
  color:var(--gold);
  text-transform:uppercase;
  letter-spacing:.1em;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.copy-btn {
  font-size:.65rem;
  padding:4px 10px;
  background:transparent;
  border:1px solid var(--border);
  border-radius:50px;
  color:var(--muted);
  cursor:pointer;
  font-family:'Tajawal',sans-serif;
  transition:all .2s;
}
.copy-btn:hover { border-color:var(--gold); color:var(--gold2); }
.copy-btn.copied { border-color:var(--green); color:var(--green); }

/* title box */
.title-box {
  background:#0c0c18;
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px 16px;
  font-size:.95rem;
  font-weight:700;
  color:var(--text);
  line-height:1.6;
}

/* hashtag tokens */
.tags-wrap {
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.tag {
  padding:6px 12px;
  background:var(--gold-glow);
  border:1px solid rgba(201,168,76,.25);
  border-radius:50px;
  font-size:.78rem;
  color:var(--gold2);
  cursor:default;
  user-select:all;
  transition:background .2s;
}
.tag:hover { background:rgba(201,168,76,.2); }

/* keywords */
.kw-wrap {
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.kw {
  padding:5px 11px;
  background:#0c0c18;
  border:1px solid var(--border);
  border-radius:50px;
  font-size:.75rem;
  color:var(--muted);
  user-select:all;
}

/* platforms */
.platform-tabs { display:flex; gap:6px; margin-bottom:12px; }
.plt-btn {
  padding:6px 14px;
  background:#0c0c18;
  border:1px solid var(--border);
  border-radius:50px;
  color:var(--muted);
  font-size:.72rem;
  cursor:pointer;
  font-family:'Tajawal',sans-serif;
  transition:all .2s;
}
.plt-btn.active { border-color:var(--gold); background:var(--gold-glow); color:var(--gold2); }

/* caption box */
.caption-box {
  background:#0c0c18;
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px 16px;
  font-size:.82rem;
  color:var(--text);
  line-height:1.9;
  white-space:pre-wrap;
  direction:rtl;
}

/* popular shortcuts */
.popular-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.pop-btn {
  padding:10px 12px;
  background:#0c0c18;
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-family:'Tajawal',sans-serif;
  font-size:.8rem;
  cursor:pointer;
  text-align:center;
  transition:all .2s;
  line-height:1.5;
}
.pop-btn:hover { border-color:var(--gold); color:var(--gold2); background:var(--gold-glow); }
.pop-meta { font-size:.65rem; color:var(--muted); display:block; margin-top:2px; }

/* loading spinner for AI */
.ai-loading {
  display:flex; align-items:center; gap:10px;
  padding:16px; color:var(--muted); font-size:.82rem;
}
</style>
</head>

<header>

</header>

</div>

<!-- READERS -->
<div class="card">
  <div class="card-title">اختر القارئ</div>

  </div>
</div>

<!-- AUDIO PLAYER -->
<div class="card" id="player-card">
  <div class="card-title">التلاوة</div>
  <div class="player">
    <button class="play-btn" onclick="togglePlay()">
      <svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <div class="audio-info">
      <div class="reader-name-disp" id="readerNameDisp">—</div>
      <div class="audio-status" id="audioStatus">اختر آية أولاً</div>
      <div class="prog-wrap" onclick="seekAudio(event)">
        <div class="prog-fill" id="progFill"></div>
      </div>
    </div>
  </div>
  <div class="vol-row">
    <label>🔊</label>
    <input type="range" min="0" max="100" value="80" oninput="setVol(this.value)">
  </div>
</div>

<!-- GENERATE -->
<div class="card">
  <div class="card-title">توليد محتوى النشر</div>
  <button class="gen-btn" id="genBtn" onclick="generateContent()" disabled>
    ✨ توليد العنوان والهاشتاقات والكلمات المفتاحية
  </button>
</div>

<!-- RESULTS -->
<div id="results">

  <!-- TITLE -->
  <div class="card">
    <div class="result-section">
      <div class="result-label">
        عنوان الريلز
        <button class="copy-btn" onclick="copyText('titleBox',this)">نسخ</button>
      </div>
      <div class="title-box" id="titleBox"></div>
    </div>
  </div>

  <!-- PLATFORM CAPTIONS -->
  <div class="card">
    <div class="result-section">
      <div class="result-label">كابشن جاهز للنشر</div>
      <div class="platform-tabs">
        <button class="plt-btn active" onclick="switchPlatform('instagram',this)">انستغرام</button>
        <button class="plt-btn" onclick="switchPlatform('tiktok',this)">تيك توك</button>
        <button class="plt-btn" onclick="switchPlatform('youtube',this)">يوتيوب شورتس</button>
        <button class="plt-btn" onclick="switchPlatform('twitter',this)">X / تويتر</button>
      </div>
      <div class="caption-box" id="captionBox"></div>
      <div style="margin-top:8px;display:flex;justify-content:flex-end">
        <button class="copy-btn" onclick="copyText('captionBox',this)">نسخ الكابشن</button>
      </div>
    </div>
  </div>

  <!-- HASHTAGS -->
  <div class="card">
    <div class="result-section">
      <div class="result-label">
        هاشتاقات
        <button class="copy-btn" onclick="copyAllTags(this)">نسخ الكل</button>
      </div>
      <div class="tags-wrap" id="tagsWrap"></div>
    </div>
  </div>

  <!-- KEYWORDS -->
  <div class="card">
    <div class="result-section">
      <div class="result-label">
        كلمات مفتاحية SEO
        <button class="copy-btn" onclick="copyText('keywordsBox',this)">نسخ</button>
      </div>
      <div class="kw-wrap" id="keywordsBox"></div>
    </div>
  </div>

  <!-- BEST TIME -->
  <div class="card">
    <div class="result-section">
      <div class="result-label">أفضل وقت للنشر</div>
      <div class="title-box" id="bestTimeBox" style="font-weight:400;font-size:.85rem;line-height:1.9"></div>
    </div>
  </div>

</div><!-- end results -->

</div><!-- wrap -->

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
(function init() {
  populateSurahs();
  renderReaders();
  audioEl.ontimeupdate = onTimeUpdate;
  audioEl.oncanplay = onCanPlay;
  audioEl.onerror = onAudioError;
  audioEl.onended = onAudioEnded;
})();

function populateSurahs() {
  const sel = document.getElementById('surahSel');
  sel.innerHTML = '<option value="">— اختر السورة —</option>';
  SURAHS.forEach(s => {
    sel.innerHTML += `<option value="${s.n}">${s.n}. ${s.name}</option>`;
  });
}

function renderReaders() {
  const list = document.getElementById('readersList');
  list.innerHTML = '';
  READERS.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'reader-chip' + (r.id === state.readerId ? ' active' : '');
    btn.textContent = r.name;
    btn.onclick = () => {
      document.querySelectorAll('.reader-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.readerId = r.id;
      state.readerName = r.name;
      document.getElementById('readerNameDisp').textContent = r.name;
      // reload audio with new reader
      if (state.surahNum) loadAudio();
    };
    list.appendChild(btn);
  });
}

// ═══════════════════════════════════════
// SURAH / VERSE
// ═══════════════════════════════════════
function onSurahChange() {
  const num = parseInt(document.getElementById('surahSel').value);
  if (!num) return;
  state.surahNum = num;
  const surah = SURAHS.find(s => s.n === num);
  const from = document.getElementById('verseFrom');
  const to = document.getElementById('verseTo');
  from.innerHTML = to.innerHTML = '';
  for (let i = 1; i <= surah.ay; i++) {
    from.innerHTML += `<option value="${i}">${i}</option>`;
    to.innerHTML += `<option value="${i}">${i}</option>`;
  }
  to.value = Math.min(surah.ay, num === 1 ? 7 : 5);
  onVerseChange();
}

async function onVerseChange() {
  const num = parseInt(document.getElementById('surahSel').value);
  const from = parseInt(document.getElementById('verseFrom').value);
  const to = parseInt(document.getElementById('verseTo').value);
  if (!num || !from) return;
  state.surahNum = num;
  state.from = from;
  state.to = to;

  // show loading
  const box = document.getElementById('verse-box');
  box.style.display = 'flex';
  box.className = 'loading';
  box.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  const verses = await fetchVerses(num, from, to);
  state.verseText = verses.join(' ');
  box.className = '';
  box.style.display = 'block';
  box.textContent = state.verseText;

  document.getElementById('genBtn').disabled = false;
  loadAudio();
}

async function fetchVerses(surahNum, from, to) {
  const key = surahNum;
  if (!window._verseCache) window._verseCache = {};
  if (!window._verseCache[key]) {
    try {
      const r = await fetch(`https://api.alquran.cloud/v1/surah/${surahNum}/quran-uthmani`,
        { signal: AbortSignal.timeout(8000) });
      const d = await r.json();
      window._verseCache[key] = d.data.ayahs;
    } catch(e) {
      return [`﴿ سورة ${SURAHS.find(s=>s.n===surahNum)?.name} - الآيات ${from} إلى ${to} ﴾`];
    }
  }
  return window._verseCache[key]
    .filter(a => a.numberInSurah >= from && a.numberInSurah <= to)
    .map(a => a.text);
}

// ═══════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════
async function loadAudio() {
  if (!state.surahNum) return;
  const key = `${state.readerId}_${state.surahNum}`;
  state.audioLoaded = false;
  document.getElementById('player-card').style.display = '';
  document.getElementById('readerNameDisp').textContent = state.readerName;
  document.getElementById('audioStatus').textContent = 'جاري التحميل...';
  document.getElementById('progFill').style.width = '0%';
  audioEl.src = '';

  let url = audioUrlCache[key];
  if (!url) {
    try {
      const r = await fetch(
        `https://api.quran.com/api/v4/chapter_recitations/${state.readerId}/${state.surahNum}`,
        { signal: AbortSignal.timeout(8000) }
      );
      if (r.ok) {
        const d = await r.json();
        url = d?.audio_file?.audio_url;
      }
    } catch(e) {}
  }

  // fallback: mp3quran.net
  if (!url) {
    try {
      const r2 = await fetch('https://www.mp3quran.net/api/v3/moshaf?language=ar',
        { signal: AbortSignal.timeout(8000) });
      const d2 = await r2.json();
      const reciters = d2?.reciters || [];
      // pick first available
      for (const rc of reciters) {
        if (rc.moshaf?.length) {
          const server = rc.moshaf[0].server;
          const sStr = String(state.surahNum).padStart(3,'0');
          url = server + sStr + '.mp3';
          break;
        }
      }
    } catch(e) {}
  }

  if (!url) {
    document.getElementById('audioStatus').textContent = 'تعذر تحميل الصوت';
    return;
  }

  audioUrlCache[key] = url;
  audioEl.src = url;
  audioEl.load();

  // seek to approximate verse after metadata
  audioEl.onloadedmetadata = () => {
    const surah = SURAHS.find(s => s.n === state.surahNum);
    if (surah && state.from > 1) {
      audioEl.currentTime = Math.max(0,
        ((state.from - 1) / surah.ay) * audioEl.duration
      );
    }
  };
}

function onCanPlay() {
  state.audioLoaded = true;
  const d = audioEl.duration;
  document.getElementById('audioStatus').textContent = d
    ? `جاهز • ${Math.floor(d/60)}:${String(Math.floor(d%60)).padStart(2,'0')}`
    : 'جاهز';
}

function onAudioError() {
  document.getElementById('audioStatus').textContent = 'خطأ — حاول مرة أخرى';
}

function onAudioEnded() {
  state.playing = false;
  document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
}

function onTimeUpdate() {
  if (audioEl.duration) {
    document.getElementById('progFill').style.width =
      (audioEl.currentTime / audioEl.duration * 100) + '%';
    const cur = audioEl.currentTime;
    document.getElementById('audioStatus').textContent =
      `${fmt(cur)} / ${fmt(audioEl.duration)}`;
  }
}

function fmt(t) {
  return `${Math.floor(t/60)}:${String(Math.floor(t%60)).padStart(2,'0')}`;
}

function togglePlay() {
  if (!audioEl.src) { loadAudio(); return; }
  if (state.playing) {
    audioEl.pause();
    state.playing = false;
    document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
  } else {
    audioEl.play().catch(() => {
      document.getElementById('audioStatus').textContent = 'اضغط مرة أخرى';
    });
    state.playing = true;
    document.getElementById('playIcon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  }
}

function seekAudio(e) {
  if (!audioEl.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  audioEl.currentTime = ((e.clientX - rect.left) / rect.width) * audioEl.duration;
}

function setVol(v) { audioEl.volume = v / 100; }

// ═══════════════════════════════════════
// QUICK LOAD
// ═══════════════════════════════════════
async function quickLoad(surah, from, to) {
  document.getElementById('surahSel').value = surah;
  onSurahChange();
  await new Promise(r => setTimeout(r, 300));
  document.getElementById('verseFrom').value = from;
  document.getElementById('verseTo').value = to;
  onVerseChange();
  // scroll to player
  setTimeout(() => document.getElementById('player-card')?.scrollIntoView({behavior:'smooth'}), 600);
}

let currentCaptions = {};

function renderResults(data) {
  state.hashtags = data.hashtags || [];
  state.keywords = data.keywords || [];
  currentCaptions = data.captions || {};

  // title
  document.getElementById('titleBox').textContent = data.title || '';

  // caption
  document.getElementById('captionBox').textContent = currentCaptions[currentPlatform] || '';

  // hashtags
  const tagsWrap = document.getElementById('tagsWrap');
  tagsWrap.innerHTML = '';
  (data.hashtags || []).forEach(tag => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = tag.startsWith('#') ? tag : '#' + tag;
    tagsWrap.appendChild(span);
  });

  // keywords
  const kwWrap = document.getElementById('keywordsBox');
  kwWrap.innerHTML = '';
  (data.keywords || []).forEach(kw => {
    const span = document.createElement('span');
    span.className = 'kw';
    span.textContent = kw;
    kwWrap.appendChild(span);
  });

  // best time
  document.getElementById('bestTimeBox').textContent = data.best_time || '';

  // show results
  document.getElementById('results').style.display = '';
  setTimeout(() => document.getElementById('results').scrollIntoView({behavior:'smooth'}), 100);
}

function switchPlatform(platform, btn) {
  currentPlatform = platform;
  document.querySelectorAll('.plt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('captionBox').textContent = currentCaptions[platform] || '';
}

// ═══════════════════════════════════════
// COPY UTILS
// ═══════════════════════════════════════
function copyText(elemId, btn) {
  const el = document.getElementById(elemId);
  navigator.clipboard.writeText(el.textContent).then(() => {
    btn.textContent = '✓ تم النسخ';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'نسخ'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyAllTags(btn) {
  const text = Array.from(document.querySelectorAll('#tagsWrap .tag'))
    .map(t => t.textContent).join(' ');
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ تم النسخ';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'نسخ الكل'; btn.classList.remove('copied'); }, 2000);
  });
}
